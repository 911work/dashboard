  const t = Math.min(value / max, 1);
  if (t < 0.25) return `rgba(46,204,113,${0.3+t*2})`;
  if (t < 0.5) return `rgba(241,196,15,${0.4+t})`;
  if (t < 0.75) return `rgba(230,126,34,${0.5+t*0.6})`;
  return `rgba(231,76,60,${0.6+t*0.4})`;
}

function getAllCountries() {
  return Object.values(COUNTRY_DATA).sort((a,b) => {
    const av = a.years[currentYear].totalVacancies;
    const bv = b.years[currentYear].totalVacancies;
    return bv - av;
  });
}

function getCountryYear(c) { return c.years[currentYear]; }


// ===================== MAP RENDERING =====================
const mapSvg = d3.select('#map-svg');
const tooltip = d3.select('#tooltip');
const mapG = mapSvg.append('g');
let worldData = null;

async function loadMap() {
  try {
    const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const world = await response.json();
    worldData = topojson.feature(world, world.objects.countries);
    renderMap();
    renderDashboard();
    document.getElementById('loading').classList.add('hidden');
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:#e74c3c">Failed to load map. Please refresh.</p>';
    console.error(e);
  }
}

function renderMap() {
  const w = mapSvg.node().clientWidth;
  const h = mapSvg.node().clientHeight;
  
  const projection = d3.geoNaturalEarth1()
    .fitSize([w - 40, h - 40], worldData)
    .translate([w/2, h/2]);
  
  const path = d3.geoPath().projection(projection);
  
  mapG.selectAll('path').remove();
  mapG.selectAll('circle').remove();
  
  mapG.selectAll('path')
    .data(worldData.features)
    .join('path')
    .attr('d', path)
    .attr('class', d => {
      const id = d.id || d.properties?.id;
      const isTracked = COUNTRY_DATA[id];
      let cls = 'country-path';
      if (isTracked) cls += ' tracked';
      if (searchTerm && isTracked) {
        const name = isTracked.name.toLowerCase();
        if (!name.includes(searchTerm.toLowerCase())) cls += ' dimmed';
      }
      return cls;
    })
    .attr('fill', d => {
      const id = d.id || d.properties?.id;
      const country = COUNTRY_DATA[id];
      if (!country) return '#1e1e3a';
      const yr = country.years[currentYear];
      return getAgingColor(yr.medianAge);
    })
    .on('mouseover', function(event, d) {
      const id = d.id || d.properties?.id;
      const country = COUNTRY_DATA[id];
      if (!country) return;
      d3.select(this).attr('stroke', '#fff').attr('stroke-width', 2);
      const yr = country.years[currentYear];
      tooltip.html(`
        <h3>${country.flag} ${country.name}</h3>
        <div class="stat"><span>Median Age</span><span>${yr.medianAge}</span></div>
        <div class="stat"><span>Dependency Ratio</span><span>${yr.depRatio}%</span></div>
        <div class="stat"><span>Job Vacancies</span><span>${fmt(yr.totalVacancies)}/yr</span></div>
        <div class="stat"><span>Severity</span><span style="color:${getAgingColor(yr.medianAge)}">${getAgingSeverity(yr.medianAge)}</span></div>
      `).classed('visible', true);
    })
    .on('mousemove', function(event) {
      tooltip.style('left', (event.clientX + 15) + 'px').style('top', (event.clientY - 10) + 'px');
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke', '#2a2a4e').attr('stroke-width', 0.5);
      tooltip.classed('visible', false);
    })
    .on('click', function(event, d) {
      const id = d.id || d.properties?.id;
      const country = COUNTRY_DATA[id];
      if (country) openDetailPanel(country);
    });

  // Add circle markers for Singapore and Taiwan (too small on map)
  const smallCountries = [COUNTRY_DATA["702"], COUNTRY_DATA["158"]].filter(Boolean);
  const coords = {"702": [103.8, 1.35], "158": [121.0, 23.5]};
  
  smallCountries.forEach(c => {
    const [lon, lat] = coords[c.id];
    const [x, y] = projection([lon, lat]);
    if (!x || !y) return;
    mapG.append('circle')
      .attr('cx', x).attr('cy', y).attr('r', 6)
      .attr('fill', getAgingColor(c.years[currentYear].medianAge))
      .attr('stroke', '#fff').attr('stroke-width', 1)
      .attr('cursor', 'pointer')
      .on('mouseover', function(event) {
        const yr = c.years[currentYear];
        tooltip.html(`
          <h3>${c.flag} ${c.name}</h3>
          <div class="stat"><span>Median Age</span><span>${yr.medianAge}</span></div>
          <div class="stat"><span>Dependency Ratio</span><span>${yr.depRatio}%</span></div>
          <div class="stat"><span>Job Vacancies</span><span>${fmt(yr.totalVacancies)}/yr</span></div>
          <div class="stat"><span>Severity</span><span style="color:${getAgingColor(yr.medianAge)}">${getAgingSeverity(yr.medianAge)}</span></div>
        `).classed('visible', true);
      })
      .on('mousemove', function(event) {
        tooltip.style('left', (event.clientX + 15) + 'px').style('top', (event.clientY - 10) + 'px');
      })
      .on('mouseout', () => tooltip.classed('visible', false))
      .on('click', () => openDetailPanel(c));
  });

  // Zoom
  const zoom = d3.zoom().scaleExtent([1, 8]).on('zoom', (event) => {
    mapG.attr('transform', event.transform);
  });
  mapSvg.call(zoom);
}


// ===================== DASHBOARD =====================
function renderDashboard() {
  renderSummaryCards();
  renderBarChart();
  renderHeatmap();
  renderFlowDiagram();
  renderSkillChart();
}

function renderSummaryCards() {
  const countries = getAllCountries();
  const totalGap = countries.reduce((s, c) => s + c.years[currentYear].totalVacancies, 0);
  const critical = countries.filter(c => c.years[currentYear].medianAge >= 48).length;
  const largest = countries[0];
  
  let fastestAging = countries[0];
  let maxAgeDiff = 0;
  countries.forEach(c => {
    const diff = c.years[2040].medianAge - c.years[2030].medianAge;
    if (diff > maxAgeDiff) { maxAgeDiff = diff; fastestAging = c; }
  });

  document.getElementById('summary-cards').innerHTML = `
    <div class="summary-card">
      <div class="label">Total Projected Job Gap</div>
      <div class="value">${fmt(totalGap)}</div>
      <div class="sub">Annual across ${countries.length} countries</div>
    </div>
    <div class="summary-card">
      <div class="label">Critical Aging Zone</div>
      <div class="value">${critical}</div>
      <div class="sub">Countries with median age ≥ 48</div>
    </div>
    <div class="summary-card">
      <div class="label">Largest Single-Country Gap</div>
      <div class="value">${fmt(largest.years[currentYear].totalVacancies)}</div>
      <div class="sub">${largest.flag} ${largest.name}</div>
    </div>
    <div class="summary-card">
      <div class="label">Fastest Aging</div>
      <div class="value">+${maxAgeDiff.toFixed(1)}</div>
      <div class="sub">${fastestAging.flag} ${fastestAging.name} (2030→2040)</div>
    </div>
  `;
}

function renderBarChart() {
  const container = document.getElementById('bar-chart');
  const countries = getAllCountries().slice(0, 15);
  const maxVal = countries[0].years[currentYear].totalVacancies;
  
  container.innerHTML = countries.map(c => {
    const yr = c.years[currentYear];
    const pct = (yr.totalVacancies / maxVal * 100).toFixed(1);
    const color = getAgingColor(yr.medianAge);
    return `<div class="bar-row" onclick="openDetailPanel(COUNTRY_DATA['${c.id}'])">
      <div class="bar-label">${c.flag} ${c.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${fmt(yr.totalVacancies)}</div></div>
      <div class="bar-value">${yr.medianAge}y / ${yr.depRatio}%</div>
    </div>`;
  }).join('');
}

function renderHeatmap() {
  const container = document.getElementById('heatmap');
  const countries = getAllCountries().slice(0, 20);
  
  let maxSector = 0;
  countries.forEach(c => {
    SECTORS.forEach(s => {
      const v = c.years[currentYear].sectors[s];
      if (v > maxSector) maxSector = v;
    });
  });

  let html = '<table class="heatmap-table"><thead><tr><th></th>';
  SECTORS.forEach(s => {
    html += `<th class="sector-th">${SECTOR_LABELS[s]}</th>`;
  });
  html += '</tr></thead><tbody>';
  
  countries.forEach(c => {
    const yr = c.years[currentYear];
    html += `<tr><td class="country-name">${c.flag} ${c.name}</td>`;
    SECTORS.forEach(s => {
      const v = yr.sectors[s];
      const bg = getHeatColor(v, maxSector);
      html += `<td class="heatmap-cell" style="background:${bg}" title="${c.name}: ${SECTOR_LABELS[s]} — ${fmt(v)} vacancies" onclick="openDetailPanel(COUNTRY_DATA['${c.id}'])">${fmt(v)}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderFlowDiagram() {
  const container = document.getElementById('flow-chart');
  const corridors = MIGRATION_CORRIDORS[currentYear];
  const maxFlow = Math.max(...corridors.map(c => c.flow));
  
  const width = container.clientWidth - 40 || 500;
  const height = 350;
  const padding = 20;
  
  // Get unique sources and targets
  const sources = [...new Set(corridors.map(c => c.source))];
  const targets = [...new Set(corridors.map(c => c.target))];
  
  const sourceScale = d3.scalePoint().domain(sources).range([padding + 30, height - padding - 10]);
  const targetScale = d3.scalePoint().domain(targets).range([padding + 30, height - padding - 10]);
  
  let svg = `<svg width="100%" height="${height}" viewBox="0 0 ${width} ${height}">`;
  
  // Draw flows
  corridors.forEach((cor, i) => {
    const sy = sourceScale(cor.source);
    const ty = targetScale(cor.target);
    const thickness = Math.max(2, (cor.flow / maxFlow) * 18);
    const hue = (i * 36) % 360;
    
    svg += `<path class="flow-path" d="M 120 ${sy} C ${width/2} ${sy}, ${width/2} ${ty}, ${width - 120} ${ty}" 
      stroke="hsl(${hue},70%,55%)" stroke-width="${thickness}" 
      onmouseover="this.style.strokeOpacity=0.9" onmouseout="this.style.strokeOpacity=0.4">
      <title>${cor.source} → ${cor.target}: ${fmt(cor.flow)}/yr</title></path>`;
  });
  
  // Source labels
  sources.forEach(s => {
    const y = sourceScale(s);
    const flag = FLAG_MAP[s] || '';
    svg += `<text x="10" y="${y+4}" class="flow-label" text-anchor="start" font-size="11">${flag} ${s}</text>`;
  });
  
  // Target labels
  targets.forEach(t => {
    const y = targetScale(t);
    const cd = Object.values(COUNTRY_DATA).find(c => c.name === t);
    const flag = cd ? cd.flag : '';
    svg += `<text x="${width-10}" y="${y+4}" class="flow-label" text-anchor="end" font-size="11">${flag} ${t}</text>`;
  });
  
  svg += '</svg>';
  container.innerHTML = svg;
}

function renderSkillChart() {
  const container = document.getElementById('skill-chart');
  const countries = getAllCountries().slice(0, 15);
  
  const colors = {low: '#3498db', medium: '#f1c40f', high: '#2ecc71'};
  
  let html = '<div style="display:flex;gap:16px;margin-bottom:12px;font-size:12px;">';
  html += `<span><span style="display:inline-block;width:12px;height:12px;background:${colors.low};border-radius:2px;margin-right:4px"></span>Low-skilled</span>`;
  html += `<span><span style="display:inline-block;width:12px;height:12px;background:${colors.medium};border-radius:2px;margin-right:4px"></span>Medium-skilled</span>`;
  html += `<span><span style="display:inline-block;width:12px;height:12px;background:${colors.high};border-radius:2px;margin-right:4px"></span>High-skilled</span>`;
  html += '</div>';
  
  countries.forEach(c => {
    const yr = c.years[currentYear];
    const sk = yr.migration.skillSplit;
    html += `<div class="stacked-bar-row">
      <div class="stacked-bar-label">${c.flag} ${c.name}</div>
      <div class="stacked-bar-track">
        <div class="stacked-segment" style="width:${sk.low}%;background:${colors.low}">${sk.low}%</div>
        <div class="stacked-segment" style="width:${sk.medium}%;background:${colors.medium}">${sk.medium}%</div>
        <div class="stacked-segment" style="width:${sk.high}%;background:${colors.high}">${sk.high}%</div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}


// ===================== DETAIL PANEL =====================
function openDetailPanel(country) {
  selectedCountry = country;
  const panel = document.getElementById('detail-panel');
  const overlay = document.getElementById('overlay');
  
  document.getElementById('panel-flag').textContent = country.flag;
  document.getElementById('panel-name').textContent = country.name;
  
  const yr = country.years[currentYear];
  const cohortLabels = ['0-9','10-19','20-29','30-39','40-49','50-59','60-69','70-79','80+'];
  const maxCohort = Math.max(...yr.ageCohorts);
  
  // Build pyramid
  let pyramidHtml = '<div class="pyramid-container">';
  for (let i = cohortLabels.length - 1; i >= 0; i--) {
    const pct = (yr.ageCohorts[i] / maxCohort * 100).toFixed(0);
    const color = i >= 6 ? '#e74c3c' : i >= 4 ? '#e67e22' : i >= 2 ? '#f1c40f' : '#2ecc71';
    pyramidHtml += `<div class="pyramid-row">
      <div class="pyramid-bar-left"><div class="pyramid-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="pyramid-label">${cohortLabels[i]}</div>
      <div class="pyramid-bar-right"><div class="pyramid-bar" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }
  pyramidHtml += '</div>';
  
  // Build sector bars
  const sortedSectors = SECTORS.map(s => ({key:s, val:yr.sectors[s]})).sort((a,b) => b.val - a.val).slice(0,5);
  const maxSec = sortedSectors[0].val;
  let sectorHtml = '<div class="mini-bar-chart">';
  sortedSectors.forEach(s => {
    const pct = (s.val / maxSec * 100).toFixed(0);
    const color = s.key === 'healthcare' ? '#e74c3c' : s.key === 'it' ? '#3498db' : s.key === 'construction' ? '#e67e22' : s.key === 'manufacturing' ? '#9b59b6' : '#2ecc71';
    sectorHtml += `<div class="mb-row">
      <div class="mb-label">${SECTOR_LABELS[s.key]}</div>
      <div class="mb-track"><div class="mb-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="mb-val">${fmt(s.val)}</div>
    </div>`;
  });
  sectorHtml += '</div>';

  // Donut chart for skills
  const sk = yr.migration.skillSplit;
  const donutSize = 80;
  const r = 35, ir = 20;
  let angle = 0;
  const slices = [
    {pct: sk.low, color: '#3498db', label: 'Low-skilled'},
    {pct: sk.medium, color: '#f1c40f', label: 'Medium-skilled'},
    {pct: sk.high, color: '#2ecc71', label: 'High-skilled'}
  ];
  let donutSvg = `<svg width="${donutSize}" height="${donutSize}" viewBox="0 0 100 100">`;
  slices.forEach(slice => {
    const startAngle = angle * Math.PI / 180;
    angle += slice.pct * 3.6;
    const endAngle = angle * Math.PI / 180;
    const largeArc = slice.pct > 50 ? 1 : 0;
    const x1 = 50 + r * Math.sin(startAngle);
    const y1 = 50 - r * Math.cos(startAngle);
    const x2 = 50 + r * Math.sin(endAngle);
    const y2 = 50 - r * Math.cos(endAngle);
    const ix1 = 50 + ir * Math.sin(endAngle);
    const iy1 = 50 - ir * Math.cos(endAngle);
    const ix2 = 50 + ir * Math.sin(startAngle);
    const iy2 = 50 - ir * Math.cos(startAngle);
    donutSvg += `<path d="M${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} L${ix1},${iy1} A${ir},${ir} 0 ${largeArc},0 ${ix2},${iy2} Z" fill="${slice.color}"/>`;
  });
  donutSvg += '</svg>';

  // Education profile
  const edu = yr.migration.eduProfile;
  let eduHtml = '<div class="mini-bar-chart">';
  [['Vocational', edu.vocational, '#e67e22'],['Bachelor', edu.bachelor, '#3498db'],['Master+', edu.master, '#9b59b6']].forEach(([label, val, color]) => {
    eduHtml += `<div class="mb-row">
      <div class="mb-label">${label}</div>
      <div class="mb-track"><div class="mb-fill" style="width:${val}%;background:${color}"></div></div>
      <div class="mb-val">${val}%</div>
    </div>`;
  });
  eduHtml += '</div>';

  // Source countries
  let sourceHtml = '<ul class="source-list">';
  yr.migration.sourceCountries.forEach((sc, i) => {
    const flag = FLAG_MAP[sc] || '';
    sourceHtml += `<li>${flag} <strong>${sc}</strong></li>`;
  });
  sourceHtml += '</ul>';

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-section">
      <h3>Demographics (${currentYear})</h3>
      ${pyramidHtml}
      <div class="stat-grid">
        <div class="stat-item"><div class="s-label">Median Age</div><div class="s-value" style="color:${getAgingColor(yr.medianAge)}">${yr.medianAge}</div></div>
        <div class="stat-item"><div class="s-label">Dependency Ratio</div><div class="s-value">${yr.depRatio}%</div></div>
        <div class="stat-item"><div class="s-label">Pop. Change</div><div class="s-value" style="color:${yr.popChange>=0?'#2ecc71':'#e74c3c'}">${yr.popChange>0?'+':''}${yr.popChange}%</div></div>
        <div class="stat-item"><div class="s-label">Working Age Δ</div><div class="s-value" style="color:${yr.workAgeChange>=0?'#2ecc71':'#e74c3c'}">${yr.workAgeChange>0?'+':''}${fmt(yr.workAgeChange)}</div></div>
      </div>
    </div>
    <div class="panel-section">
      <h3>Labor Gap (${currentYear})</h3>
      <div style="text-align:center;margin-bottom:12px">
        <div style="font-size:32px;font-weight:700;color:var(--highlight)">${fmt(yr.totalVacancies)}</div>
        <div style="font-size:11px;color:var(--text-dim)">Annual job vacancies</div>
      </div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Top 5 sectors with biggest shortages:</div>
      ${sectorHtml}
    </div>
    <div class="panel-section">
      <h3>Migration Demand</h3>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Skill level needed:</div>
      <div class="donut-container">
        ${donutSvg}
        <div class="donut-legend">
          ${slices.map(s => `<div><span class="dot" style="background:${s.color}"></span>${s.label}: ${s.pct}%</div>`).join('')}
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-dim);margin:12px 0 8px">Education profile in demand:</div>
      ${eduHtml}
      <div style="font-size:12px;color:var(--text-dim);margin:12px 0 8px">Top source countries:</div>
      ${sourceHtml}
      <div class="migration-text">${yr.migration.explanation}</div>
    </div>
  `;
  
  panel.classList.add('open');
  overlay.classList.add('visible');
}

function closeDetailPanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  selectedCountry = null;
}

// ===================== EVENT HANDLERS =====================
document.getElementById('panel-close').addEventListener('click', closeDetailPanel);
document.getElementById('overlay').addEventListener('click', closeDetailPanel);

// Year toggle
document.querySelectorAll('.year-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentYear = parseInt(this.dataset.year);
    renderMap();
    renderDashboard();
    if (selectedCountry) openDetailPanel(selectedCountry);
  });
});

// Search
let searchTimeout;
document.getElementById('search').addEventListener('input', function(e) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    searchTerm = e.target.value.trim();
    renderMap();
    // Also filter dashboard
    document.querySelectorAll('.bar-row').forEach(row => {
      const label = row.querySelector('.bar-label')?.textContent.toLowerCase() || '';
      row.style.opacity = !searchTerm || label.includes(searchTerm.toLowerCase()) ? '1' : '0.2';
    });
  }, 200);
});

// Window resize
window.addEventListener('resize', () => { if (worldData) renderMap(); });

// Keyboard
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetailPanel(); });

// ===================== INIT =====================
loadMap();
</script>
