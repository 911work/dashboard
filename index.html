<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cape Town — Жильё на 3–17 апреля 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;background:#fafafa;color:#222;line-height:1.5}
a{color:inherit;text-decoration:none}

/* ── Header ── */
.header{background:#fff;border-bottom:1px solid #ebebeb;padding:20px 0;position:sticky;top:0;z-index:100}
.header-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{font-size:22px;font-weight:700;color:#222}
.logo span{color:#ff385c}
.search-info{font-size:14px;color:#717171;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.search-info b{color:#222}
.fav-counter{background:#ff385c;color:#fff;font-size:13px;font-weight:600;padding:6px 16px;border-radius:24px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;border:none}
.fav-counter:hover{background:#e0294e}
.fav-counter.active{background:#222}

/* ── Filters ── */
.filters{max-width:1280px;margin:0 auto;padding:16px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pill{padding:8px 18px;border-radius:24px;border:1px solid #ddd;background:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;color:#222;white-space:nowrap}
.pill:hover{border-color:#222}
.pill.active{background:#222;color:#fff;border-color:#222}
.filters-label{font-size:13px;color:#717171;font-weight:500;margin-right:4px}

/* ── Grid ── */
.grid{max-width:1280px;margin:0 auto;padding:8px 24px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}

/* ── Card ── */
.card{background:#fff;border-radius:16px;overflow:hidden;transition:transform .2s,box-shadow .2s;position:relative;cursor:default}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.12)}
.card.hidden{display:none}
.card-img{width:100%;aspect-ratio:4/3;position:relative;overflow:hidden}
.card-img-bg{width:100%;height:100%;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:48px}
.badge{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.95);backdrop-filter:blur(4px);padding:4px 12px;border-radius:8px;font-size:13px;font-weight:700;color:#222;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.heart{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.4);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.heart:hover{background:rgba(0,0,0,.6);transform:scale(1.1)}
.heart.liked{background:#ff385c}
.heart svg{width:18px;height:18px;fill:#fff;transition:transform .15s}
.heart.liked svg{transform:scale(1.15)}
.district-tag{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;color:#222;letter-spacing:.3px;text-transform:uppercase}
.card-body{padding:16px 18px 20px}
.card-title{font-size:16px;font-weight:600;margin-bottom:4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-type{font-size:12px;color:#717171;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.card-desc{font-size:13px;color:#555;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.price{font-size:16px;font-weight:700}.price span{font-size:13px;font-weight:400;color:#717171}
.rating{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600}
.star{color:#ff385c}
.card-link{display:inline-block;margin-top:12px;font-size:13px;font-weight:600;color:#ff385c;transition:opacity .15s}
.card-link:hover{opacity:.7}
.card-amenities{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.amenity{font-size:11px;background:#f5f5f5;padding:3px 8px;border-radius:6px;color:#555}

/* ── Image placeholders per district ── */
.img-gardens{background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%)}
.img-tamboerskloof{background:linear-gradient(135deg,#fbc2eb 0%,#a6c1ee 100%)}
.img-newlands{background:linear-gradient(135deg,#d4fc79 0%,#96e6a1 100%)}
.img-simons{background:linear-gradient(135deg,#89f7fe 0%,#66a6ff 100%)}
.img-noordhoek{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%)}

.img-label{font-size:14px;font-weight:600;color:rgba(0,0,0,.25);text-transform:uppercase;letter-spacing:1px;position:absolute;bottom:50%;left:50%;transform:translate(-50%,50%);pointer-events:none}

/* ── Empty state ── */
.empty{text-align:center;padding:80px 24px;color:#717171;font-size:16px;display:none}
.empty.show{display:block}

/* ── Responsive ── */
@media(max-width:680px){
  .grid{grid-template-columns:1fr;padding:8px 16px 40px}
  .header-inner{padding:0 16px}
  .filters{padding:12px 16px}
  .search-info{font-size:13px}
}
</style>

      </div>
      <div class="card-body">
        <div class="card-type">${typeLabel(l.type)}</div>
        <div class="card-title">${l.title}</div>
        <div class="card-desc">${l.desc}</div>
        <div class="card-amenities">${l.amenities.map(a=>'<span class="amenity">'+a+'</span>').join('')}</div>
        <div class="card-footer">
          <div class="price">${l.price} <span>/ ночь</span></div>
          <div class="rating"><span class="star">★</span> ${l.rating}</div>
        </div>
        <a class="card-link" href="${l.url}" target="_blank" rel="noopener">Смотреть на платформе →</a>
      </div>
    `;
    grid.appendChild(card);
  });

  document.getElementById("empty").className = count === 0 ? "empty show" : "empty";
}

function typeLabel(t) {
  return t === "apartment" ? "Квартира" : t === "hotel" ? "Отель" : "Дом / Коттедж";
}

// ── Filters ──
function setFilter(district, el) {
  currentDistrict = district;
  document.querySelectorAll('.pill[data-filter]').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setType(type, el) {
  if (currentType === type) {
    currentType = null;
    el.classList.remove('active');
  } else {
    document.querySelectorAll('.pill[data-type]').forEach(p => p.classList.remove('active'));
    currentType = type;
    el.classList.add('active');
  }
  render();
}

// ── Likes ──
function toggleLike(id, btn) {
  likes[id] = !likes[id];
  if (!likes[id]) delete likes[id];
  localStorage.setItem("ct_likes", JSON.stringify(likes));
  btn.classList.toggle("liked");
  updateFavCount();
}

function updateFavCount() {
  document.getElementById("favCount").textContent = Object.keys(likes).length;
}

function toggleFavView() {
  favOnly = !favOnly;
  document.getElementById("favToggle").classList.toggle("active", favOnly);
  render();
}

// ── Init ──
updateFavCount();
render();
</script>
</body>
</html>
